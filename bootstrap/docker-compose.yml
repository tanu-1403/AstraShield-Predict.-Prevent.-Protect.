version: "3.9"

services:
  astrashield-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrashield_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  astrashield-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrashield_pipeline
    command: python3 main.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    profiles:
      - pipeline
